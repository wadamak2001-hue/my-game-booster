<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            background-color: #111111;
            border: 2px solid #00f2ff;
            border-radius: 15px;
            padding: 20px;
            margin: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .value {
            color: #00f2ff;
            font-size: 24px;
            font-weight: bold;
        }
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            background-color: #00f2ff;
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">CPU: <span class="value">17%</span></div>
    <div class="card">RAM: <span class="value">4.2GB</span></div>
    <div class="card">FPS: <span class="value">60</span></div>
    
    <button class="btn" onclick="alert('تم تحسين الأداء بنجاح!')">تحسين الأداء</button>

</body>
</html>
