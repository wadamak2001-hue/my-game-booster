<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Space</title>
    <style>
        /* إعدادات الخلفية الحية */
        body { 
            margin: 0; 
            padding: 0; 
            background: radial-gradient(circle at center, #001f3f, #000000);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }

        /* البطاقات الزجاجية المتوهجة */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.5); 
            border-radius: 20px; 
            padding: 20px; 
            margin: 10px; 
            width: 80%; 
            max-width: 280px; 
            text-align: center; 
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .value { 
            color: #00f2ff; 
            font-size: 28px; 
            font-weight: bold; 
            text-shadow: 0 0 10px #00f2ff;
        }

        /* زر التحسين النيون */
        .btn { 
            margin-top: 30px; 
            padding: 20px 50px; 
            background: linear-gradient(90deg, #00f2ff, #0077ff); 
            border: none; 
            border-radius: 50px; 
            color: white; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            transition: 0.3s;
        }
        
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="card">المعالج <div class="value">17%</div></div>
    <div class="card">الرام <div class="value">4.2GB</div></div>
    <div class="card">الإطارات <div class="value">60 FPS</div></div>
    
    <button class="btn" onclick="alert('جاري تسريع الألعاب...')">🚀 تحسين الأداء</button>

</body>
</html>
