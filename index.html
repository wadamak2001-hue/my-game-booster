<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VOID GAME ENGINE</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* واجهة علوية احترافية */
        .dashboard { width: 100%; padding: 30px 20px; background: linear-gradient(180deg, #111, #0a0a0a); text-align: center; border-bottom: 2px solid #00f2ff; }
        .status-bar { font-size: 1.2em; color: #00f2ff; margin-bottom: 10px; }
        
        /* قائمة التطبيقات (المشغل) */
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; width: 90%; }
        .app-item { background: #1a1a1a; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .app-item:active { background: #00f2ff; color: #000; }
        
        /* زر التعزيز العالمي */
        .master-btn { position: fixed; bottom: 30px; width: 90%; padding: 20px; background: #00f2ff; border: none; border-radius: 40px; font-weight: bold; font-size: 1.2em; box-shadow: 0 0 40px #00f2ff; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="status-bar">نظام VOID جاهز - الأداء الأمثل</div>
        <h1>مركز الألعاب</h1>
    </div>

    <div class="app-grid">
        <div class="app-item" onclick="alert('فتح Free Fire...')">🎮 Free Fire</div>
        <div class="app-item" onclick="alert('فتح PUBG...')">🎮 PUBG</div>
        <div class="app-item" onclick="alert('فتح Call of Duty...')">🎮 CoD</div>
        <div class="app-item" onclick="alert('فتح Genshin...')">🎮 Genshin</div>
    </div>

    <button class="master-btn" onclick="alert('تم تنظيف النظام وتسريع الألعاب!')">🚀 تفعيل المحرك بالكامل</button>

</body>
</html>
