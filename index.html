<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Space Pro</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* الخلفية الاحترافية */
        .live-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
                   background: linear-gradient(135deg, #050b14, #004e64); }

        /* شريط المعلومات العلوي */
        .top-bar { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        .stat { font-size: 14px; color: #00f2ff; font-weight: bold; }

        /* منطقة الألعاب والأزرار */
        .game-area { margin-top: 100px; text-align: center; }
        .main-btn { width: 280px; height: 60px; background: linear-gradient(90deg, #00a8cc, #00f2ff); 
                    border: none; border-radius: 30px; color: white; font-size: 22px; font-weight: bold; 
                    box-shadow: 0 0 25px #00f2ff; cursor: pointer; }
        
        .action-btns { margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        .small-btn { padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; 
                     border-radius: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="live-bg"></div>

    <div class="top-bar">
        <div class="stat" id="ram">RAM: 58%</div>
        <div class="stat" id="cpu">CPU: 48%</div>
        <div class="stat">BAT: 21%</div>
    </div>

    <div class="game-area">
        <button class="main-btn" onclick="startBoost()">بـدء</button>
        
        <div class="action-btns">
            <button class="small-btn" onclick="cleanRam()">تنظيف الرام</button>
            <button class="small-btn" onclick="boostNetwork()">تحسين الشبكة</button>
        </div>
    </div>

    <script>
        // وظائف VOID BOOSTER المدمجة
        function startBoost() {
            alert("جاري تشغيل الألعاب بكامل الطاقة...");
        }

        function cleanRam() {
            alert("تم مسح الملفات المؤقتة بنجاح!");
        }

        function boostNetwork() {
            alert("تم تحسين استجابة السيرفر!");
        }

        // تحديث البيانات الوهمي ليعطي شعور النظام الحقيقي
        setInterval(() => {
            document.getElementById('ram').innerText = "RAM: " + (50 + Math.floor(Math.random() * 10)) + "%";
            document.getElementById('cpu').innerText = "CPU: " + (40 + Math.floor(Math.random() * 10)) + "%";
        }, 3000);
    </script>
</body>
</html>
