<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* إعدادات الشاشة الكاملة ونظام الألوان */
        body { margin: 0; background: #050b14; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* تأثير الإضاءة المحيطة */
        .glow-bg { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #002d42 0%, #050b14 70%); z-index: -1; }
        
        /* البطاقات الاحترافية (Glassmorphism) */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; margin-bottom: 30px; }
        .box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 15px; padding: 15px; text-align: center; backdrop-filter: blur(5px); }
        .box-title { color: #888; font-size: 0.8em; margin-bottom: 5px; }
        .box-value { color: #00f2ff; font-weight: bold; font-size: 1.2em; text-shadow: 0 0 10px #00f2ff; }
        
        /* زر الأداء العالي */
        .start-btn { width: 90%; padding: 20px; background: linear-gradient(90deg, #0077ff, #00f2ff); border: none; border-radius: 15px; color: #fff; font-size: 1.2em; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); transition: 0.3s; }
        .start-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div class="grid-container">
        <div class="box"><div class="box-title">CPU</div><div class="box-value">12%</div></div>
        <div class="box"><div class="box-title">RAM</div><div class="box-value">4.2GB</div></div>
        <div class="box"><div class="box-title">FPS</div><div class="box-value">60</div></div>
    </div>

    <button class="start-btn" onclick="alert('تفعيل وضع الألعاب...');">بـدء تعزيز الأداء</button>
</body>
</html>
