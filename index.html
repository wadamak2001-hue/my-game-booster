<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        /* تأثير الفيديو في الخلفية */
        .bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.4; }
        /* شاشة الافتتاح (Splash Screen) */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeOut 2s forwards 2s; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        /* واجهة المستخدم */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #00ff41; }
        .data { font-size: 1.2em; color: #00ff41; }
    </style>
</head>
<body>
    <video autoplay muted loop class="bg-video"><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
    
    <div id="splash"><h1>⚡ GAME BOOSTER PRO</h1></div>

    <div class="container">
        <div class="card">الرام<div class="data">8GB</div></div>
        <div class="card">البينج<div class="data">24ms</div></div>
    </div>
    <button style="width: 90%; margin: 20px auto; padding: 20px; background: #00ff41; border: none; border-radius: 10px; font-weight: bold; display: block;">تحسين الأداء الآن</button>
</body>
</html>
